services:
  kafka:
    image: apache/kafka:4.3.0
    ports:
      - "9092:9092"
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-topics.sh",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: CONTROLLER://:9094,INTERNAL://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Single-broker dev cluster: pin every broker-internal topic's replication
      # factor to 1. These default to 3, which a 1-broker cluster cannot satisfy,
      # so the coordinator can never create the topic and its clients hang.
      # __consumer_offsets blocks consumer groups; __transaction_state blocks
      # idempotent/transactional producers. See ADR-0015.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Topics are provisioned explicitly by `just infra-topics` at their
      # contracted partition count (ADR-0012). With auto-create on, a producer
      # hitting a missing topic would silently birth it at 1 partition, which
      # rehashes every key once grown to 6 — so a missing topic must fail loudly
      # instead. Locked pair: this stays `false` only because the provisioning
      # script exists; never flip it on without removing that script.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false
      # The image defaults log.dir to /tmp/kafka-logs; move it to a conventional
      # path and back it with a named volume so the log (and KRaft's cluster
      # metadata) survives a container recreate. Without this, every broker
      # config change wipes all topics, events, and committed offsets.
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pulse"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      POSTGRES_DB: pulse
      POSTGRES_PASSWORD: example
  redis:
    image: redis:8.8.0
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  apicurio:
    image: apicurio/apicurio-registry-mem:2.6.13.Final
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  kafka_data:
